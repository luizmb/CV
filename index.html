<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>{{css}}</style>
</head>
<body>
<div class="header">
  <div class="hleft">
    <span class="hname">{{name}}</span>
    <span class="hlabel">{{label}}</span>
  </div>
  <div class="hright">
    <span class="hcontact">
      <strong>{{email}}</strong><br>
      {{phone}}<br>
      {{linkedin}}<br>
      {{github}}<br>
      {{location}} &nbsp;·&nbsp; {{visa}}
    </span>
  </div>
</div>
<div class="content">
<p class="summary">{{summary}}</p>
{{skills}}
{{experience}}
{{earlier_experience}}
{{footer}}
</div>
</body>
</html>
